# docker-compose — stockmd-mini
# Local-only sandbox. Bind to 127.0.0.1 explicitly; never 0.0.0.0.
# When the stack is nextjs-supabase, the Supabase services come from the
# `supabase` CLI ( `supabase start` ), not from this compose file.

services:
  app:
    build: .
    container_name: stockmd-mini-app
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./:/app
      - app-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
    healthcheck:
      # node:20-bookworm-slim ships without wget/curl, so use Node's built-in
      # fetch (Node 18+). Exits 0 only on HTTP 2xx from /api/health.
      test:
        - "CMD-SHELL"
        - >-
          node -e "fetch('http://127.0.0.1:3000/api/health')
          .then(r => process.exit(r.ok ? 0 : 1))
          .catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  app-node-modules: {}

